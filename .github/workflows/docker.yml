name: Docker

# Builds the Docker image on every push/tag to validate that docker/Dockerfile
# works. It is intentionally NOT pushed to a registry — publishing to GHCR needs
# package-write permissions and registry setup that aren't required for a
# pip-installable project.
#
# To publish images later: set `push: true`, add back a GHCR login step
# (docker/login-action with ${{ secrets.GITHUB_TOKEN }}) and a metadata step,
# add `permissions: { packages: write }`, and enable
# Settings → Actions → General → "Read and write permissions".

on:
  push:
    branches: [main, master]
    tags:
      - "v*"

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (validation only — not pushed)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: maestro:ci
